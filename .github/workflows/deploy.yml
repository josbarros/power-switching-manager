name: Build Zip

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

jobs:
  build-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create zip
        run: make zip

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: power-switching-manager-zip
          path: power-switching-manager@joseruibarros.com.zip
